<!DOCTYPE html>
<html>
<head>
    <title>Guess the Name</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 30px;
            background-color: #ADD8E6;
        }

        h1 {
            margin-bottom: 10px;
        }

        #status {
            font-size: 20px;
            margin-bottom: 20px;
        }

        #inputs {
            margin-bottom: 20px;
        }

        input {
            font-size: 24px;
            text-transform: uppercase;
            text-align: center;
            padding: 8px;
            margin: 5px;
        }

        #firstName {
            width: 140px;
        }

        #middleName {
            width: 150px;
        }

        button {
            font-size: 20px;
            padding: 8px 16px;
        }

        .row {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-bottom: 5px;
        }

        .tile {
            width: 50px;
            height: 50px;
            border: 2px solid #ccc;
            font-size: 28px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .correct {
            background: #6aaa64;
            color: white;
        }

        .present {
            background: #c9b458;
            color: white;
        }

        .absent {
            background: #787c7e;
            color: white;
        }

        #message {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
        }
        #popup {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        #popupContent {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            font-size: 48px;
            font-weight: bold;
            max-width: 90%;
        }
        
        #popupContent p {
            margin-top: 20px;
            font-size: 28px;
        }
    </style>
</head>
<body>

<h1>Baby Name Wordle</h1>
<p> guess the Pavek's baby boy's name! </p>
    
<p style="color: #666; font-size: 18px;">
    First Name: 4 letters • Middle Name: 5 letters
</p>

<p style="color: #666; font-size: 18px;">
    Each name is scored seperately (letters in the first name will not be shown as yellow in the middle name)
</p>

<div id="status">
    Guesses Remaining: <span id="remaining">8</span>
</div>

<div id="inputs">
    <input id="firstName"
           maxlength="4"
           placeholder="First Name">

    <input id="middleName"
           maxlength="5"
           placeholder="Middle">

    <button onclick="submitGuess()">Guess</button>
</div>

<div id="board"></div>

<div id="message"></div>

<div id="popup">
    <div id="popupContent">
        <div id="popupTitle"></div>
        <p>Levi Silas Pavek</p>
        <p>Coming November 2026</p>
        
    </div>
</div>

<canvas id="confettiCanvas"
        style="position:fixed;
               inset:0;
               pointer-events:none;
               z-index:999;">
</canvas>

<script>

const FIRST = "LEVI";
const MIDDLE = "SILAS";

let remaining = 8;

function evaluateLetter(letter, position, answer) {

    if (letter === answer[position]) {
        return "correct";
    }

    if (answer.includes(letter)) {
        return "present";
    }

    return "absent";
}

function makeTile(letter, result) {

    const tile = document.createElement("div");
    tile.classList.add("tile");
    tile.classList.add(result);
    tile.textContent = letter;

    return tile;
}

function showPopup(title) {

    document.getElementById("popupTitle").innerHTML = title;

    document.getElementById("popup").style.display = "flex";
}

function launchConfetti() {

    const canvas =
        document.getElementById("confettiCanvas");

    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const pieces = [];

    for (let i = 0; i < 250; i++) {

        pieces.push({
            x: Math.random() * canvas.width,
            y: -20,
            vx: (Math.random() - 0.5) * 6,
            vy: Math.random() * 4 + 2,
            size: Math.random() * 8 + 4,
            color: `hsl(${Math.random()*360},100%,50%)`
        });
    }

    let frames = 0;

    function animate() {

        ctx.clearRect(
            0,
            0,
            canvas.width,
            canvas.height
        );

        pieces.forEach(p => {

            p.x += p.vx;
            p.y += p.vy;
            p.vy += 0.05;

            ctx.fillStyle = p.color;

            ctx.fillRect(
                p.x,
                p.y,
                p.size,
                p.size
            );
        });

        frames++;

        if (frames < 300) {
            requestAnimationFrame(animate);
        }
    }

    animate();
}

function submitGuess() {

    if (remaining <= 0) return;

    const firstGuess =
        document.getElementById("firstName")
        .value
        .toUpperCase();

    const middleGuess =
        document.getElementById("middleName")
        .value
        .toUpperCase();

    if (firstGuess.length !== 4 ||
        middleGuess.length !== 5) {

        alert(
            "First name must be 4 letters and middle name must be 5 letters."
        );
        return;
    }

    const board = document.getElementById("board");

    const row = document.createElement("div");
    row.classList.add("row");

    for (let i = 0; i < 4; i++) {

        row.appendChild(
            makeTile(
                firstGuess[i],
                evaluateLetter(firstGuess[i], i, FIRST)
            )
        );
    }

    const spacer = document.createElement("div");
    spacer.style.width = "20px";
    row.appendChild(spacer);

    for (let i = 0; i < 5; i++) {

        row.appendChild(
            makeTile(
                middleGuess[i],
                evaluateLetter(middleGuess[i], i, MIDDLE)
            )
        );
    }

    board.appendChild(row);

    remaining--;
    document.getElementById("remaining").textContent =
        remaining;

    if (firstGuess === FIRST &&
        middleGuess === MIDDLE) {

        showPopup("🎉 YOU GOT IT!");
        launchConfetti();
        
        disableInputs();
        return;
    }

    if (remaining === 0) {

        showPopup("❌ OUT OF GUESSES");

        disableInputs();
    }

    document.getElementById("firstName").value = "";
    document.getElementById("middleName").value = "";

    document.getElementById("firstName").focus();
}

function disableInputs() {

    document.getElementById("firstName").disabled = true;
    document.getElementById("middleName").disabled = true;
}

</script>

</body>
</html>
