<!DOCTYPE html>
<html>
<head>
    <title>Guess the Name</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 30px;
        }

        h1 {
            margin-bottom: 10px;
        }

        #status {
            font-size: 20px;
            margin-bottom: 20px;
        }

        #inputs {
            margin-bottom: 20px;
        }

        input {
            font-size: 24px;
            text-transform: uppercase;
            text-align: center;
            padding: 8px;
            margin: 5px;
        }

        #firstName {
            width: 180px;
        }

        #middleName {
            width: 100px;
        }

        button {
            font-size: 20px;
            padding: 8px 16px;
        }

        .row {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-bottom: 5px;
        }

        .tile {
            width: 50px;
            height: 50px;
            border: 2px solid #ccc;
            font-size: 28px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .correct {
            background: #6aaa64;
            color: white;
        }

        .present {
            background: #c9b458;
            color: white;
        }

        .absent {
            background: #787c7e;
            color: white;
        }

        #message {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h1>Guess the Name</h1>

<p style="color: #666; font-size: 18px;">
    First Name: 6 letters • Middle Name: 3 letters
</p>

<p style="color: #666; font-size: 18px;">
    Each name is scored seperately (letters in the first name will not be shown as yellow in the middle name)
</p>

<div id="status">
    Guesses Remaining: <span id="remaining">6</span>
</div>

<div id="inputs">
    <input id="firstName"
           maxlength="6"
           placeholder="First Name">

    <input id="middleName"
           maxlength="3"
           placeholder="Middle">

    <button onclick="submitGuess()">Guess</button>
</div>

<div id="board"></div>

<div id="message"></div>

<script>

const FIRST = "MAGGIE";
const MIDDLE = "JOY";

let remaining = 6;

function evaluateLetter(letter, position, answer) {

    if (letter === answer[position]) {
        return "correct";
    }

    if (answer.includes(letter)) {
        return "present";
    }

    return "absent";
}

function makeTile(letter, result) {

    const tile = document.createElement("div");
    tile.classList.add("tile");
    tile.classList.add(result);
    tile.textContent = letter;

    return tile;
}

function submitGuess() {

    if (remaining <= 0) return;

    const firstGuess =
        document.getElementById("firstName")
        .value
        .toUpperCase();

    const middleGuess =
        document.getElementById("middleName")
        .value
        .toUpperCase();

    if (firstGuess.length !== 6 ||
        middleGuess.length !== 3) {

        alert(
            "First name must be 6 letters and middle name must be 3 letters."
        );
        return;
    }

    const board = document.getElementById("board");

    const row = document.createElement("div");
    row.classList.add("row");

    for (let i = 0; i < 6; i++) {

        row.appendChild(
            makeTile(
                firstGuess[i],
                evaluateLetter(firstGuess[i], i, FIRST)
            )
        );
    }

    const spacer = document.createElement("div");
    spacer.style.width = "20px";
    row.appendChild(spacer);

    for (let i = 0; i < 3; i++) {

        row.appendChild(
            makeTile(
                middleGuess[i],
                evaluateLetter(middleGuess[i], i, MIDDLE)
            )
        );
    }

    board.appendChild(row);

    remaining--;
    document.getElementById("remaining").textContent =
        remaining;

    if (firstGuess === FIRST &&
        middleGuess === MIDDLE) {

        document.getElementById("message").innerHTML =
            "🎉 You got it!<br><br>Maggie Joy";

        disableInputs();
        return;
    }

    if (remaining === 0) {

        document.getElementById("message").innerHTML =
            "❌ Out of guesses!<br><br>The answer was Maggie Joy.";

        disableInputs();
    }

    document.getElementById("firstName").value = "";
    document.getElementById("middleName").value = "";

    document.getElementById("firstName").focus();
}

function disableInputs() {

    document.getElementById("firstName").disabled = true;
    document.getElementById("middleName").disabled = true;
}

</script>

</body>
</html>
